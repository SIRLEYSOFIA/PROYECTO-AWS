<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios | Roles</title>
  <link rel="stylesheet" href="/usuarios.css" />
</head>
<body>
  <header class="users-header">
    <div>
      <h1>Usuarios y roles</h1>
      <p>Administra accesos de administrador y cajero.</p>
    </div>
    <nav class="users-actions" aria-label="Navegacion principal">
      <a class="btn btn-primary" href="/pos.html">Abrir POS</a>
      <a class="btn btn-secondary" href="/productos.html">Productos</a>
      <a class="btn btn-secondary" href="/ventas.html">Ventas</a>
      <a class="btn btn-secondary" href="/cuadre.html">Cuadre</a>
      <button id="logout-btn" class="btn btn-danger" type="button">Cerrar sesion</button>
    </nav>
  </header>

  <main class="users-main">
    <section class="users-panel">
      <div class="panel-heading">
        <h2>Crear usuario</h2>
        <span>Solo administradores</span>
      </div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <form id="user-form" class="user-form">
        <div class="field">
          <label for="usuario">Usuario</label>
          <input id="usuario" type="text" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="contrasena">Contraseña</label>
          <input id="contrasena" type="password" required />
        </div>
        <div class="field">
          <label for="rol">Rol</label>
          <select id="rol">
            <option value="CAJERO">Cajero</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Guardar usuario</button>
      </form>
    </section>

    <section class="users-panel users-panel--table">
      <div class="panel-heading">
        <h2>Usuarios registrados</h2>
        <button id="reload-btn" class="btn btn-secondary" type="button">Recargar</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="4">Cargando usuarios...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/usuarios.js"></script>
</body>
</html>
