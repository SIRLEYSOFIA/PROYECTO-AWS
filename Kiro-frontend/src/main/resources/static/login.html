<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Punto de Venta</title>
    <link rel="stylesheet" href="/login.css" />
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-left">
        <span class="eyebrow">Punto de venta</span>
        <h1>Control comercial claro y elegante</h1>
        <p>
            Administra productos, ventas y cuadre de caja desde una experiencia
            rápida, ordenada y conectada a AWS.
        </p>
    </section>

    <section class="auth-right">
        <div class="glass-card login-card">
            <h2>Iniciar sesión</h2>
            <p class="muted">Accede con tus credenciales</p>

            <div id="loginMessage"></div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Usuario" required />
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" placeholder="Contraseña" required />
                </div>

                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            </form>
            <p class="auth-switch">
                ¿Nuevo en el sistema?
                <a href="/register.html">Crear cuenta de cajero</a>
            </p>
        </div>
    </section>
</div>

<script src="/login.js"></script>
</body>
</html>
